name: Apply v0.4.10 code patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Bootstrap v0.4.10 patch application'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild patch
        shell: bash
        run: |
          cat .codex-patches/v0410.patch.gz.b64.part* > /tmp/v0410.patch.gz.b64
          echo "0cf9725434a19613bb75570a486116574447051fe17717756870d7fa452fe8ea  /tmp/v0410.patch.gz.b64" | sha256sum -c -
          base64 -d /tmp/v0410.patch.gz.b64 | gzip -d > /tmp/v0410.patch
          git apply --check /tmp/v0410.patch

      - name: Apply patch
        shell: bash
        run: |
          git apply --index /tmp/v0410.patch
          git diff --cached --stat

      - name: Validate Python sources
        shell: bash
        run: |
          python3 -m compileall app_info.py main.py cad core export pricing purchase settings ui tests
          python3 -m unittest discover -v

      - name: Commit and push v0.4.10 code
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
          git commit -m "Build calculator interface v0.4.10"
          git push
