name: Apply v0.5.0 patch

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-v050.yml"
      - ".codex-patches/v050.patch.gz.b64.part*"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch
        shell: bash
        run: |
          set -euo pipefail
          cat .codex-patches/v050.patch.gz.b64.part* > /tmp/v050.patch.gz.b64
          base64 -d /tmp/v050.patch.gz.b64 > /tmp/v050.patch.gz
          gzip -d /tmp/v050.patch.gz
          sha256sum /tmp/v050.patch
          test "$(sha256sum /tmp/v050.patch | awk '{print $1}')" = "f54e9991cc0e3e7cdd75832a53681154151d53073c989d164020dd1af51d818f"
          git apply --check /tmp/v050.patch
          git apply /tmp/v050.patch

      - name: Verify
        shell: bash
        run: |
          python3 -m compileall app_info.py main.py cad core export nesting pricing purchase settings ui tests
          python3 -m unittest discover -v

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add sheet DXF nesting"
          git push
