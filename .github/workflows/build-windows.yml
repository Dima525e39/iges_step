name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/**"
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-activate-base: false
          use-mamba: true

      - name: Build EXE
        shell: cmd
        run: build_exe.bat

      - name: Verify build output
        shell: cmd
        run: |
          dir /S dist
          if not exist dist\TubeCutCalculator.exe exit /b 1
          if not exist dist\version.txt exit /b 1

      - name: Smoke test packaged imports
        shell: pwsh
        run: |
          $logPath = "dist\self-test-imports.txt"
          $process = Start-Process -FilePath ".\dist\TubeCutCalculator.exe" -ArgumentList @("--self-test-imports", "--self-test-output", $logPath) -Wait -PassThru
          if (Test-Path $logPath) {
            Get-Content $logPath
          }
          if ($process.ExitCode -ne 0) {
            exit $process.ExitCode
          }

      - name: Package Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" a -t7z -mx=9 package\TubeCutCalculator-v0.4.5-windows.7z dist\TubeCutCalculator.exe dist\version.txt
          Get-ChildItem -Recurse package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeCutCalculator-windows-${{ github.run_number }}
          if-no-files-found: error
          path: package/*.7z

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: package/*.7z
