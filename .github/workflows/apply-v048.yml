name: Apply v0.4.8 code patch

on:
  push:
    branches:
      - main
    paths:
      - ".codex-patches/v048.patch.gz.b64.part*"
      - ".github/workflows/apply-v048.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply v0.4.8 code patch
        shell: bash
        run: |
          set -euo pipefail
          cat .codex-patches/v048.patch.gz.b64.part* > /tmp/v048.patch.gz.b64
          test "$(wc -c < /tmp/v048.patch.gz.b64)" = "9100"
          echo "5fdba0178216f95941242941c44d1c81c21f0dd4441568d953e1ebea076bb6e5  /tmp/v048.patch.gz.b64" | sha256sum -c -
          base64 -d /tmp/v048.patch.gz.b64 | gzip -dc > /tmp/v048.patch
          echo "01659329220ab82d57f4ced21719ab7dc7b444fd899456e56fdd4ee5926781ae  /tmp/v048.patch" | sha256sum -c -
          git apply --check /tmp/v048.patch
          git apply --whitespace=nowarn /tmp/v048.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md app_info.py build_exe.bat cad/debug_edges.py cad/edge_classifier.py cad/unfolder.py pyproject.toml tests/test_file_queue.py ui/main_window.py version.txt
          git status --short
          git commit -m "Rework cut length through cut-face components"
          git push
