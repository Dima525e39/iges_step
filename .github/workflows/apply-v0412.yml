name: Apply v0.4.12 code patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Bootstrap v0.4.12 patch application'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild patch
        shell: bash
        run: |
          cat .codex-patches/v0412.patch.gz.b64.part* > /tmp/v0412.patch.gz.b64
          base64 -d /tmp/v0412.patch.gz.b64 | gzip -d > /tmp/v0412.patch
          echo "3d707ebc7707c08cc59a795e694125948e75836814e703bbca8a2c3546b03e51  /tmp/v0412.patch" | sha256sum -c -
          git apply --check /tmp/v0412.patch

      - name: Apply patch and remove bootstrap files
        shell: bash
        run: |
          git apply --index /tmp/v0412.patch
          git rm -f .github/workflows/apply-v0412.yml .codex-patches/v0412.patch.gz.b64.part00 .codex-patches/v0412.patch.gz.b64.part01
          git diff --cached --stat

      - name: Validate Python sources
        shell: bash
        run: |
          python3 -m compileall app_info.py main.py cad core export pricing settings ui tests
          python3 -m unittest discover -v

      - name: Commit and push v0.4.12 code
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi
          git commit -m "Add round tube outer loop cut analysis"
          git push
