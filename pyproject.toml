[project]
name = "tube-cut-calculator"
version = "0.1.0"
description = "Windows GUI skeleton for laser tube cutting calculation workflow."
requires-python = ">=3.13"
dependencies = [
    "PySide6>=6.9,<7",
]

[project.optional-dependencies]
build = [
    "pyinstaller>=6.14,<7",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
